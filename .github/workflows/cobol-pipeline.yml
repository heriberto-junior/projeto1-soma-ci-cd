name: COBOL CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      numero1:
        description: 'Primeiro número'
        required: true
        default: '10'
      numero2:
        description: 'Segundo número'
        required: true
        default: '20'

env:
  COBOL_PROGRAM: src/soma.cob
  COBOL_EXECUTABLE: soma

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Instalar GNU COBOL
      run: |
        sudo apt-get update
        sudo apt-get install -y gnucobol
        cobc --version
    
    - name: Compilar programa COBOL
      run: |
        cobc -x -free -o ${{ env.COBOL_EXECUTABLE }} ${{ env.COBOL_PROGRAM }}
        echo "✓ Compilação bem-sucedida"
    
    - name: Executar testes com valores padrão
      run: |
        echo "Teste 1: 100 + 200"
        ./${{ env.COBOL_EXECUTABLE }} 100 200
        
        echo ""
        echo "Teste 2: 500 + 1500"
        ./${{ env.COBOL_EXECUTABLE }} 500 1500
        
        echo ""
        echo "Teste 3: 0 + 999"
        ./${{ env.COBOL_EXECUTABLE }} 0 999
    
    - name: Executar com valores customizados
      if: github.event_name == 'workflow_dispatch'
      run: |
        echo "Executando com valores customizados"
        ./${{ env.COBOL_EXECUTABLE }} ${{ github.event.inputs.numero1 }} ${{ github.event.inputs.numero2 }}
    
    - name: Executar com valores de variáveis de ambiente
      env:
        NUM1: 42
        NUM2: 58
      run: |
        echo "Executando com variáveis de ambiente"
        ./${{ env.COBOL_EXECUTABLE }} $NUM1 $NUM2
    
    - name: Gerar relatório de execução
      if: always()
      run: |
        echo "## Relatório de Execução COBOL" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- Programa: ${{ env.COBOL_PROGRAM }}" >> $GITHUB_STEP_SUMMARY
        echo "- Executável: ${{ env.COBOL_EXECUTABLE }}" >> $GITHUB_STEP_SUMMARY
        echo "- Status: ✓ Sucesso" >> $GITHUB_STEP_SUMMARY
        echo "- Data: $(date)" >> $GITHUB_STEP_SUMMARY 
