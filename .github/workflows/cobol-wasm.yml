name: COBOL to WebAssembly

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cd emsdk
          ./emsdk install latest
          ./emsdk activate latest
          source ./emsdk_env.sh
          echo "source $PWD/emsdk_env.sh" >> $GITHUB_ENV

      - name: Compile COBOL to C
        run: cobc -Wall -C SOMA-WASM.cob -o soma.c

      - name: Compile C to WebAssembly
        run: |
          source $GITHUB_ENV
          emcc soma.c -o cobol.js \
            -s MODULARIZE=1 \
            -s EXPORTED_FUNCTIONS=['_main'] \
            -s EXPORTED_RUNTIME_METHODS=['ccall','cwrap']

      - name: Prepare site
        run: |
          mkdir -p site
          cp index.html site/
          cp cobol.js site/
          cp cobol.wasm site/

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/deploy-pages@v4
